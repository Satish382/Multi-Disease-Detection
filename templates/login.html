<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F8FAFC;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Unique geometric background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(15, 23, 42, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            background: #ffffff;
            padding: 50px 45px;
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(15, 23, 42, 0.08),
                0 0 1px rgba(15, 23, 42, 0.1);
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
        }

        .logo h1 {
            color: #0F172A;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.8px;
        }

        .logo p {
            color: #64748B;
            font-size: 14px;
            font-weight: 500;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(20px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        h2 {
            color: #0F172A;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #0F172A;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.2px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: #F8FAFC;
            color: #0F172A;
            font-weight: 500;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3B82F6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form-group input::placeholder {
            color: #94A3B8;
            font-weight: 400;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
            letter-spacing: -0.3px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-form {
            text-align: center;
            margin-top: 28px;
            color: #64748B;
            font-size: 14px;
            font-weight: 500;
        }

        .toggle-form a {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 700;
            transition: opacity 0.2s;
        }

        .toggle-form a:hover {
            opacity: 0.8;
        }

        .error {
            color: #EF4444;
            font-size: 13px;
            margin-top: 10px;
            padding: 12px 16px;
            background: #FEF2F2;
            border-radius: 10px;
            border-left: 4px solid #EF4444;
            font-weight: 500;
        }

        .success {
            color: #10B981;
            font-size: 13px;
            margin-top: 10px;
            padding: 12px 16px;
            background: #F0FDF4;
            border-radius: 10px;
            border-left: 4px solid #10B981;
            font-weight: 500;
        }

        .error:empty, .success:empty {
            display: none;
        }

        /* Decorative elements */
        .decorative-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3B82F6 0%, #2563EB 100%);
            border-radius: 24px 24px 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decorative-line"></div>
        <div class="logo">
            <div class="logo-icon">🧠</div>
            <h1>Medical AI</h1>
            <p>Advanced Brain Diagnostics</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <h2>Welcome Back</h2>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <div id="loginError" class="error"></div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <div class="toggle-form">
                Don't have an account? <a href="#" onclick="showSignup()">Create one</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-container">
            <h2>Create Account</h2>
            <form id="signupFormElement">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a strong password" required>
                </div>
                <div class="form-group">
                    <label for="signupConfirmPassword">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" placeholder="Re-enter password" required>
                </div>
                <div id="signupError" class="error"></div>
                <div id="signupSuccess" class="success"></div>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <div class="toggle-form">
                Already have an account? <a href="#" onclick="showLogin()">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        function showSignup() {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('signupForm').classList.add('active');
            clearMessages();
        }

        function showLogin() {
            document.getElementById('signupForm').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            clearMessages();
        }

        function clearMessages() {
            document.getElementById('loginError').textContent = '';
            document.getElementById('signupError').textContent = '';
            document.getElementById('signupSuccess').textContent = '';
        }

        // Handle Signup
        document.getElementById('signupFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match!';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters!';
                return;
            }
            
            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = 'Account created successfully! Redirecting...';
                    setTimeout(() => showLogin(), 1500);
                } else {
                    errorDiv.textContent = data.error || 'Signup failed!';
                }
            } catch (error) {
                errorDiv.textContent = 'An error occurred. Please try again.';
            }
        });

        // Handle Login
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = '';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = data.error || 'Login failed!';
                }
            } catch (error) {
                errorDiv.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
